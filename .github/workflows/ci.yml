name: ci

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: gofmt
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "The following files are not formatted:" >&2
            echo "$fmt_out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: go test with coverage
        run: |
          go test -v ./... -coverprofile=cover.out -covermode=atomic -coverpkg=./... -json | tee report.json

      - name: test report
        uses: becheran/go-testreport@main
        with:
          input: report.json

      - name: coverage summary
        run: |
          {
            echo "## Coverage Report"
            echo
            echo '```'
            go tool cover -func=cover.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive image tag from branch
        run: |
          tag="${GITHUB_REF_NAME}"
          # Docker tag safe: lowercase and replace unsupported chars.
          tag="$(echo "$tag" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9_.-]#-#g')"
          echo "IMAGE_TAG=$tag" >> "$GITHUB_ENV"

      - name: goreleaser snapshot (publish ghcr images)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          args: release --snapshot --clean --skip archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: push images
        if: ${{ github.ref_type == 'branch' }}
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}-arm64
          docker push ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}-amd64
          docker manifest create \
            ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }} \
            ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}-arm64 \
            ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}-amd64
          docker manifest push ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}
